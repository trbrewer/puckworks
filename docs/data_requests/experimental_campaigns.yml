    instrument_requirements: SENSOR_SELECTION_REQUIRED
    calibration_requirements: [first-drip detector latency characterization]
    synchronization_requirements: [drip detector synchronized to the pressure/mass clock]
    raw_file_schema: shot_timeseries.csv + shot_metadata.csv
    processed_file_schema: per-shot first-drip + saturation summary
    uncertainty_requirements: PILOT_REQUIRED
