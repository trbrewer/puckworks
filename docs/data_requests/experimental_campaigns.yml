  - campaign_id: EXP-003
    title: Grinder-specific particle-size, packing, and permeability map
    status: proposed
    priority: 1
    scientific_question: >-
      For a specific grinder, how do particle-size metrics, packing, and permeability relate — so an
      adapter can map a grinder setting to physics WITHOUT a universal dial->size assumption?
    decision_enabled: >-
      validation of wadsworth2026 grind/permeability; defensible per-grinder input adapters (e.g. the
      EK43-dial input needed by pannusch2024.solver)
    target_components: [wadsworth2026.permeability, wadsworth2026.grindmap]
    target_gates: [gate_wadsworth_collapse]
    quantity_definitions: []
    required_observables:
      - {name: particle_size_distribution, unit: um, reference_basis: not_applicable}
      - {name: fines_fraction, unit: "%", reference_basis: dry_coffee_mass}
      - {name: dry_dose, unit: g, reference_basis: not_applicable}
      - {name: bed_porosity, unit: "-", reference_basis: not_applicable}
      - {name: permeability, unit: m^2, reference_basis: not_applicable}
      - {name: pressure_flow_curve, unit: "bar; g/s", reference_basis: not_applicable}
    required_metadata: [grinder_make_model, burr_geometry, burr_wear_state, dial_zero_method, roast_metadata]
    prescribed_vs_measured: [dial_setting_vs_measured_particle_size]
    design_factors: [grinder_setting, operator, day]
    controls: [fixed tamp procedure, fixed bed dimensions]
    replication_design_status: DESIGN_CALCULATION_REQUIRED
    instrument_requirements: SENSOR_SELECTION_REQUIRED
    calibration_requirements: [particle sizer calibration, flow/pressure calibration]
    synchronization_requirements: [not applicable for the static permeability test]
    raw_file_schema: apparatus.yml + permeability_test.csv + psd.csv
    processed_file_schema: per-setting permeability + PSD summary
    uncertainty_requirements: PILOT_REQUIRED
    quality_control_checks: [monotonic pressure ramp, PSD sums to unity within tolerance]
    preregistered_analysis: PILOT_REQUIRED
    acceptance_calculation: DESIGN_CALCULATION_REQUIRED
    holdout_requirement: predeclared holdout grinder settings/days
    current_evidence: controlled_replicated
    evidence_gap: no per-grinder dial->physics map with repeatability across days/operators
    evidence_ceiling: grinder-specific; a dial is never a universal particle size
    measurement_agenda_blockers: ["pannusch2024.solver#1"]
    related_issues: ["#70"]
    code_rights_expectation: contributor-owned raw data; Puckworks code MIT
    data_rights_expectation: contributor grants a redistribution licence
    output_rights_expectation: derived maps redistributable once the dataset licence permits
    recommended_repository: Zenodo or OSF with a DOI
    data_license_status: REQUIRED_FROM_CONTRIBUTOR
    submission_instructions: open an experimental-data proposal issue, then submit metadata + external DOI

