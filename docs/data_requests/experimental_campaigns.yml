# Puckworks experimental-data campaigns (machine-readable catalog).
#
# Deterministic ordering by campaign_id. Every campaign names at least one model / gate / adapter
# decision / evidence claim it would inform, and every structured measurement-agenda blocker
# (quantity_semantics.measurement_agenda) is mapped to a campaign here (or explicitly deferred).
#
# NO measured value, sample size, sampling rate, sensor tolerance, or acceptance threshold is invented.
# Where such a value is not yet known it is recorded as one of: DESIGN_CALCULATION_REQUIRED,
# SENSOR_SELECTION_REQUIRED, PILOT_REQUIRED. Validate with: python tools/experimental_data_needs.py verify
schema_version: 1
# runtime/runner components with no current experimental campaign, each for a documented reason:
#   grudeva2025.reduced   — rights-blocked (#73); no campaign until the rights decision is made.
#   foster2025.machine_mode — the pump/headspace "machine mode" backlog; no campaign is defined yet.
#   wadsworth2026.inertial  — the inertial-flow supporting lens; no campaign is defined yet.
component_campaign_exemptions:
  - grudeva2025.reduced       # rights-blocked pending #73 (no new data collection authorized)
  - foster2025.machine_mode   # machine-mode backlog (no open campaign yet)
  - wadsworth2026.inertial    # inertial-flow backlog (no open campaign yet)
  - brewer2026.lb_reference   # synthetic NUMERICAL CODE VERIFICATION: its reference is the analytic
                              # plane-Poiseuille solution (k=h^2/12), not an experimental measurement, so
                              # no experimental campaign applies by construction (#70)
evidence_levels:
  - protocol_only
  - feasibility_pilot
  - controlled_replicated
  - holdout_independent
  - cross_condition_replication
campaigns:
  - campaign_id: EXP-001
    title: Synchronized whole-shot telemetry and cup chemistry
    status: proposed
    priority: 1
    scientific_question: >-
      Does the guided-pull / Cameron chain reproduce the measured pressure/flow/mass time histories and
      the final TDS/EY for a bounded shot on one machine + coffee?
    decision_enabled: validation of cameron2020.extraction_bdf against independent whole-shot observations
    target_components: [cameron2020.extraction_bdf]
    target_gates: [gate_cameron_conservation]
    quantity_definitions: [cameron.extraction_yield]
    required_observables:
      - {name: elapsed_time, unit: s, reference_basis: not_applicable}
      - {name: basket_pressure, unit: bar, reference_basis: not_applicable}
      - {name: beverage_mass, unit: g, reference_basis: not_applicable}
      - {name: flow_rate, unit: g/s, reference_basis: not_applicable}
      - {name: brew_temperature, unit: degC, reference_basis: not_applicable}
      - {name: final_tds, unit: "%", reference_basis: beverage_mass}
      - {name: final_extraction_yield, unit: "%", reference_basis: dry_coffee_mass}
    required_metadata: [dose_g, target_beverage_g, grinder_id, grinder_setting, basket_id, coffee_lot_id]
    prescribed_vs_measured:
      - prescribed_pressure_vs_measured_pressure
      - scale_derived_flow_vs_directly_measured_flow
      - target_beverage_mass_vs_achieved_beverage_mass
    design_factors: [dose_g, grinder_setting]
    controls: [fixed machine, fixed coffee lot per block]
    replication_design_status: DESIGN_CALCULATION_REQUIRED
    instrument_requirements: SENSOR_SELECTION_REQUIRED
    calibration_requirements: [pressure sensor pre/post, scale calibration mass]
    synchronization_requirements: [single monotonic clock or documented per-signal offset]
    raw_file_schema: shot_timeseries.csv + shot_metadata.csv
    processed_file_schema: derived per-shot summary (separate from raw)
    uncertainty_requirements: PILOT_REQUIRED
    quality_control_checks: [monotonic time, non-negative mass, achieved vs target within recorded tolerance]
    preregistered_analysis: PILOT_REQUIRED
    acceptance_calculation: DESIGN_CALCULATION_REQUIRED
    holdout_requirement: predeclared holdout shots before any fitting
    current_evidence: feasibility_pilot
    evidence_gap: no synchronized independent whole-shot dataset with cup chemistry is in the registry
    evidence_ceiling: single machine/coffee validation is not a universal claim
    measurement_agenda_blockers: []
    related_issues: ["#70", "#48"]
    code_rights_expectation: contributor-owned raw data; Puckworks code MIT
    data_rights_expectation: contributor grants a redistribution licence (CC BY 4.0 or CC0 preferred)
    output_rights_expectation: derived gates/plots redistributable once the dataset licence permits
    recommended_repository: Zenodo or OSF with a DOI
    data_license_status: REQUIRED_FROM_CONTRIBUTOR
    submission_instructions: open an experimental-data proposal issue, then submit metadata + external DOI

