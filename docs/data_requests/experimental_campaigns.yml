    acceptance_calculation: DESIGN_CALCULATION_REQUIRED
    holdout_requirement: predeclared holdout fixtures
    current_evidence: feasibility_pilot
    evidence_gap: only one DE1 fixture is in the registry; no replicated independent first-drip dataset
