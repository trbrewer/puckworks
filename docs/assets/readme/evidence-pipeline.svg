<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 892"
     preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="ep-title ep-desc">
  <title id="ep-title">How evidence moves through Puckworks</title>
  <desc id="ep-desc">A single-column, six-step flow. 1: a paper or dataset (published measurements or a
    source study). 2: a model card capturing the physics, parameters, assumptions, and the conditions
    where each model applies. 3: a testable model module — code with a checked data handoff at each
    stage boundary and a record of where the model came from. 4: automated scientific checks compare
    it with equations, published curves, or independent data, showing known gaps rather than hiding
    them. 5: an evidence-aware result, with every number labelled measured, derived, fitted, predicted,
    or simulated. 6: what to measure next, or what the data cannot yet support. A dashed feedback loop
    returns from step 6 to step 1, because uncertainty guides the next experiment.</desc>
  <!-- Self-contained light card: its own light background keeps dark text legible on both light and
       dark GitHub themes. System fonts only. Each step is numbered AND labelled (no colour-only
       meaning). Single vertical column stays readable at mobile width; multi-line copy uses tspans. -->
  <defs>
    <style>
      .t  { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .num{ font-weight: 700; fill: #ffffff; }
      .hd { font-weight: 700; fill: #14181c; }
      .sb { font-weight: 400; fill: #414850; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0 0 L8 5 L0 10 Z" fill="#5a616a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="600" height="892" rx="18" fill="#f6f7f5"/>
  <text x="300" y="46" text-anchor="middle" class="t hd" font-size="24">How evidence moves through Puckworks</text>

  <!-- 1 -->
  <g class="t">
    <rect x="52" y="76" width="496" height="108" rx="14" fill="#ffffff" stroke="#cfd4ce" stroke-width="1.5"/>
    <circle cx="90" cy="130" r="17" fill="#0e7490"/>
    <text x="90" y="137" text-anchor="middle" class="num" font-size="20">1</text>
    <text x="126" y="116" class="hd" font-size="21">Paper or dataset</text>
    <text x="126" y="150" class="sb" font-size="16">Published measurements or a source study.</text>
  </g>
  <line x1="300" y1="184" x2="300" y2="210" stroke="#5a616a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 2 -->
  <g class="t">
    <rect x="52" y="212" width="496" height="108" rx="14" fill="#ffffff" stroke="#cfd4ce" stroke-width="1.5"/>
    <circle cx="90" cy="266" r="17" fill="#0e7490"/>
    <text x="90" y="273" text-anchor="middle" class="num" font-size="20">2</text>
    <text x="126" y="252" class="hd" font-size="21">Model card</text>
    <text x="126" y="282" class="sb" font-size="16"><tspan x="126">The physics, parameters, assumptions, and the</tspan><tspan x="126" dy="22">conditions where each model applies.</tspan></text>
  </g>
  <line x1="300" y1="320" x2="300" y2="346" stroke="#5a616a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 3 -->
  <g class="t">
    <rect x="52" y="348" width="496" height="108" rx="14" fill="#ffffff" stroke="#cfd4ce" stroke-width="1.5"/>
    <circle cx="90" cy="402" r="17" fill="#0e7490"/>
    <text x="90" y="409" text-anchor="middle" class="num" font-size="20">3</text>
    <text x="126" y="388" class="hd" font-size="21">Testable model module</text>
    <text x="126" y="418" class="sb" font-size="16"><tspan x="126">Code with a checked data handoff between</tspan><tspan x="126" dy="22">stages, and a record of where it came from.</tspan></text>
  </g>
  <line x1="300" y1="456" x2="300" y2="482" stroke="#5a616a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 4 -->
  <g class="t">
    <rect x="52" y="484" width="496" height="108" rx="14" fill="#ffffff" stroke="#cfd4ce" stroke-width="1.5"/>
    <circle cx="90" cy="538" r="17" fill="#b06a2c"/>
    <text x="90" y="545" text-anchor="middle" class="num" font-size="20">4</text>
    <text x="126" y="524" class="hd" font-size="21">Automated scientific checks</text>
    <text x="126" y="554" class="sb" font-size="16"><tspan x="126">Compared with equations, published curves,</tspan><tspan x="126" dy="22">or independent data; gaps shown, not hidden.</tspan></text>
  </g>
  <line x1="300" y1="592" x2="300" y2="618" stroke="#5a616a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 5 -->
  <g class="t">
    <rect x="52" y="620" width="496" height="108" rx="14" fill="#ffffff" stroke="#cfd4ce" stroke-width="1.5"/>
    <circle cx="90" cy="674" r="17" fill="#0e7490"/>
    <text x="90" y="681" text-anchor="middle" class="num" font-size="20">5</text>
    <text x="126" y="660" class="hd" font-size="21">Evidence-aware result</text>
    <text x="126" y="690" class="sb" font-size="16"><tspan x="126">Every number is labelled measured, derived,</tspan><tspan x="126" dy="22">fitted, predicted, or simulated.</tspan></text>
  </g>
  <line x1="300" y1="728" x2="300" y2="754" stroke="#5a616a" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 6 -->
  <g class="t">
    <rect x="52" y="756" width="496" height="108" rx="14" fill="#ffffff" stroke="#cfd4ce" stroke-width="1.5"/>
    <circle cx="90" cy="810" r="17" fill="#3f7d3a"/>
    <text x="90" y="817" text-anchor="middle" class="num" font-size="20">6</text>
    <text x="126" y="796" class="hd" font-size="21">What to measure next</text>
    <text x="126" y="826" class="sb" font-size="16"><tspan x="126">Which measurement would sharpen the result —</tspan><tspan x="126" dy="22">or what the data cannot yet support.</tspan></text>
  </g>

  <!-- feedback loop 6 -> 1 (uncertainty guides the next experiment) -->
  <path d="M52 810 C22 810 22 130 52 130" fill="none" stroke="#9aa1a8" stroke-width="2"
        stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <text x="18" y="470" text-anchor="middle" class="t sb" font-size="13"
        transform="rotate(-90 18 470)">uncertainty guides the next experiment</text>
</svg>
