# Puckworks research-radar query configuration (issue #42).
#
# Machine-readable input for tools/research_radar.py. Each query is a TRIAGE lens, not a decision
# rule: a hit is a candidate for human review, never evidence, a card change, or a submission.
#
# Fields per query:
#   id                 stable slug (used in issue bodies + dedupe provenance)
#   title              human label
#   enabled            true/false — disabled queries are never sent
#   source_families    subset of [arxiv, crossref] (only official metadata APIs)
#   terms              match/search terms (also used to explain WHY a candidate matched)
#   exclusions         drop candidates whose title/abstract contains any of these
#   relevance_notes    why this family matters to Puckworks
#   coupled_cards      model cards / claims this query is meant to inform (provenance only)
#   last_human_review  date a human last reviewed this query's vocabulary (quarterly cadence)
#   owner              who curates this query
#   max_candidates     hard cap on candidates kept per run for this query
#
# Vocabulary is reviewed QUARTERLY (see docs/RESEARCH_RADAR.md §15). Editing terms here is a
# human action; the scanner never edits this file.

version: 1
defaults:
  owner: maintainer
  last_human_review: 2026-07-17
  max_candidates: 8

queries:
  - id: espresso-extraction
    title: Espresso extraction modelling
    enabled: true
    source_families: [arxiv, crossref]
    terms: ["espresso", "extraction", "coffee bed", "brew"]
    exclusions: ["marketing", "barista training"]
    relevance_notes: Core process; informs the extraction-stage components.
    coupled_cards: ["cameron2020", "pannusch2024", "mo2023_2"]
    last_human_review: 2026-07-17
    owner: maintainer
    max_candidates: 8

  - id: coffee-extraction-kinetics
    title: Coffee extraction kinetics and dissolution
    enabled: true
    source_families: [arxiv, crossref]
    terms: ["coffee", "extraction kinetics", "dissolution", "solute transport"]
    exclusions: ["sensory panel", "consumer preference"]
    relevance_notes: Kinetic closures and solute inventory; K(T) / c_sat debates.
    coupled_cards: ["romancorrochano2017", "pannusch2024", "schmieder"]
    last_human_review: 2026-07-17
    max_candidates: 8

  - id: coffee-porous-bed
    title: Coffee packed bed and permeability
    enabled: true
    source_families: [arxiv, crossref]
    terms: ["coffee", "packed bed", "permeability", "porosity"]
    exclusions: []
    relevance_notes: Bed permeability + packing; Wadsworth/Forchheimer lineage.
    coupled_cards: ["wadsworth2026", "brewer2026.pack_generator"]
    last_human_review: 2026-07-17
    max_candidates: 8

  - id: deformable-porous-media
    title: Deformable / poroelastic porous media
    enabled: true
    source_families: [arxiv, crossref]
    terms: ["deformable porous media", "poroelastic", "consolidation", "compaction"]
    exclusions: ["geotechnical foundation"]
    relevance_notes: Poroelastic flow closure behind coupled_kappa_t.
    coupled_cards: ["brewer2026.coupled_kappa_t"]
    last_human_review: 2026-07-17
    max_candidates: 6

  - id: granular-packed-bed-flow
    title: Granular compaction and packed-bed flow
    enabled: true
    source_families: [arxiv, crossref]
    terms: ["granular", "packed bed flow", "rearrangement", "compaction"]
    exclusions: []
    relevance_notes: Grain rearrangement affecting bed dynamics.
    coupled_cards: ["brewer2026.streamtube"]
    last_human_review: 2026-07-17
    max_candidates: 6

  - id: wetting-infiltration
    title: Wetting and infiltration in porous media
    enabled: true
    source_families: [arxiv, crossref]
    terms: ["wetting", "infiltration", "imbibition", "unsaturated flow"]
    exclusions: []
    relevance_notes: Infiltration front + unsaturated flow (G1 constitutive gap).
    coupled_cards: ["foster2025.infiltration"]
    last_human_review: 2026-07-17
    max_candidates: 6

  - id: swelling-fines-migration
    title: Swelling, fines migration, clogging, erosion
    enabled: true
    source_families: [arxiv, crossref]
