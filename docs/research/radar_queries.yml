# Puckworks research-radar query configuration (issue #42).
#
# Machine-readable input for tools/research_radar.py. Each query is a TRIAGE lens, not a decision
# rule: a hit is a candidate for human review, never evidence, a card change, or a submission.
#
# Structured query model (per query):
#   id                 stable unique slug (dedupe provenance)
#   title              human label
#   enabled            true/false — disabled queries are never sent
#   lookback_days      recent window for a weekly scan (positive int; quarterly backfill is separate)
#   maximum_candidates hard cap on candidates kept per run for this query (1..100)
#   global_priority    ordering hint across queries (1 = highest)
#   concept_groups     list of synonym groups. The scanner ANDs across groups and ORs within a
#                      group -> arXiv: (all:"a" OR all:"b") AND (all:"c"); Crossref: bibliographic
#                      free-text of the first synonym per group.
#   exclusions         drop candidates whose title/abstract contains any of these
#   source_families    subset of [arxiv, crossref] (default both; only official metadata APIs)
#   relevance_notes    why this family matters to Puckworks
#   coupled_cards      model cards / claims this query informs (provenance only)
#   last_human_review  ISO date a human last reviewed this query's vocabulary (quarterly cadence)
#   owner              who curates this query
#
# Vocabulary is reviewed QUARTERLY (docs/RESEARCH_RADAR.md §15). Editing terms here is a human
# action; the scanner never edits this file. arXiv pacing >= 3 s/request; Crossref polite pool.

version: 1
defaults:
  owner: maintainer
  lookback_days: 21
  maximum_candidates: 8

