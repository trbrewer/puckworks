name: quick-pr
# Fast, network-free unit + integrity tests on every push/PR (WP5 quick lane).
# Selects the QUICK marked set only — slow science sweeps run in slow-science.yml.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quick-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false          # R0: one Python version must not cancel/hide the other
      matrix:
        # EVERY advertised interpreter (pyproject classifiers 3.10-3.13) must be exercised:
        # oldest (3.10), 3.11, primary/release (3.12), newest (3.13).
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: lint (ruff, pyflakes ruleset)
        run: ruff check --output-format=github puckworks/ tests/
      - name: environment diagnostics
        run: |
          python -VV
          python -m pip --version
          python -m pip freeze
          python -m pytest --version
          echo "SHA=$GITHUB_SHA  PYTHONHASHSEED=${PYTHONHASHSEED:-unset}"
      - name: quick lane (offline, deterministic; excludes slow/live/gpu/external_data)
        run: >
          pytest -q -m "not slow and not live and not gpu and not external_data"
          --junitxml=quick-report-${{ matrix.python-version }}.xml --durations=15
      - name: upload diagnostics (even on failure)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quick-pr-report-${{ matrix.python-version }}
          path: quick-report-${{ matrix.python-version }}.xml
          if-no-files-found: ignore

  min-deps:
    # Prove the declared lower bounds actually work (P0.5): install the MINIMUM numpy/scipy on the
    # oldest supported interpreter and run the offline suite. If this goes red, the pyproject floor
    # is wrong — not a mystery. Not a required check until the maintainer opts in.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
      - run: pip install "numpy==2.0.*" "scipy==1.13.*" pytest && pip install -e . --no-deps
      - name: offline suite on the declared minimum dependencies
        run: pytest -q -m "not slow and not live and not gpu and not external_data"

  quality:
    # P1.3 quality ratchet — Stage-1 mypy on the core public/release/control modules and a
    # coverage FLOOR on those modules. Not a required check until the maintainer opts in.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: mypy (core modules, Stage 1)
        run: mypy
      - name: coverage floor on critical modules (baseline 70%; ratchet up over time)
        run: |
          pytest -q -m "not slow and not live and not gpu and not external_data" --cov=puckworks --cov-report=
          coverage report --fail-under=70 --include="puckworks/validate.py,puckworks/statusdoc.py,puckworks/gate_runner.py,puckworks/registry.py,puckworks/release.py,puckworks/paper3/archive.py,puckworks/paper3/evidence_graph.py"
