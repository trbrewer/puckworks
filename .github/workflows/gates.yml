name: quick-pr
# Fast, network-free unit + integrity tests on every push/PR (WP3.1 quick-pr lane).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quick:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q
