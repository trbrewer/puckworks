name: paper3-evidence
# WP2.4 — SCOPED evidence-graph strict validation.
#   * paper3-scope-strict is the Paper-3 RELEASE gate (fail-closed on the asserted Paper-3 claims).
#   * all-scope-strict requires the WHOLE graph to be adjudicated.
# Whether these are REQUIRED to merge is a GitHub branch-protection setting, not a fact this file
# can establish — query it with `python -m puckworks.statusdoc --audit-ruleset`.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paper3-scope-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Paper-3 release gate — asserted claims are honestly and coherently resolved
        run: python -m puckworks.paper3.evidence_graph --reconcile --strict --scope paper3

  all-scope-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Full graph strict — every gate wiring is adjudicated
        run: python -m puckworks.paper3.evidence_graph --reconcile --strict --scope all
