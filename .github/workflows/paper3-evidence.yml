name: paper3-evidence
# WP2.4 — SCOPED evidence-graph strict validation.
#   * paper3-scope-strict runs on every PR/push as the Paper-3 RELEASE gate (fail-closed on the
#     asserted Paper-3 claims only).
#   * all-scope-strict now also runs on every PR/push (the whole graph is fully adjudicated as of
#     the remaining-adjudication PR). Both are green on main; NEITHER is yet a required branch
#     check — add them to branch protection when you want them to block merges.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paper3-scope-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Paper-3 release gate — asserted claims are honestly and coherently resolved
        run: python -m puckworks.paper3.evidence_graph --reconcile --strict --scope paper3

  all-scope-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Full graph strict — every gate wiring is adjudicated
        run: python -m puckworks.paper3.evidence_graph --reconcile --strict --scope all
