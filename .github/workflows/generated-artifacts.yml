name: generated-artifacts
# Regenerate producer-backed artifacts and FAIL on any drift (WP3.1 generated-artifacts lane).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: generated-artifacts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-generated:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Paper 3 registry artifacts are up to date
        run: python -m puckworks.paper3.registry_artifacts --verify
      - name: Paper 3 build verify (schema + bundle)
        run: python -m puckworks.paper3.build verify
      - name: Lateral-coupling discrimination artifacts are up to date (WP6)
        run: python -m puckworks.analysis.lateral_coupling_discrimination --verify
      - name: Evidence graph reconciles with the live registry (draft mode)
        run: python -m puckworks.paper3.evidence_graph --reconcile
      - name: Evidence-graph artifacts are up to date (WP2.4)
        run: python -m puckworks.paper3.evidence_graph --verify
      - name: Paper 3 archive builds deterministically and self-verifies (no dist)
        run: |
          python -m puckworks.paper3.archive create-archive --out /tmp/pa.tar.gz
          python -m puckworks.paper3.archive create-archive --out /tmp/pb.tar.gz
          cmp /tmp/pa.tar.gz /tmp/pb.tar.gz
          python -m puckworks.paper3.archive verify-archive /tmp/pa.tar.gz

  status-truth:
    # Canonical status: STATE_OF_TRUTH.md must be generated from docs/status/current.json and
    # internally consistent. fetch-depth: 0 so completed items' verified_commit values resolve.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e "."
      - name: Status source is valid and STATE_OF_TRUTH.md is up to date
        run: python -m puckworks.statusdoc --verify
