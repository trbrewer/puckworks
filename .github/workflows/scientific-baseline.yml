name: scientific-baseline
# Runs the FROZEN-scientific-baseline / cross-model-determinism / import-order-invariance tests
# ('-m scientific_baseline') on every push and PR. These are also `slow`, so the quick-pr lane
# excludes them and slow-science only runs weekly — which is how the Full-Laboratory-Tour hash
# baseline drifted silently while gate PRs merged green (#139). This job closes that gap: an
# unintended change to a frozen scientific hash now fails at PR time.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: scientific-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scientific-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: assert the scientific-baseline set is non-empty (marker not silently dropped)
        run: |
          COUNT=$(python -m pytest -m scientific_baseline --collect-only -q 2>/dev/null | grep -c "::")
          echo "scientific_baseline tests selected: $COUNT"
          test "$COUNT" -ge 1
      - name: frozen scientific baselines + cross-model determinism (offline)
        run: >
          pytest -q -m "scientific_baseline and not live and not gpu and not external_data"
          --junitxml=scientific-baseline-report.xml --durations=0
      - name: upload report (even on failure)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scientific-baseline-report
          path: scientific-baseline-report.xml
          if-no-files-found: ignore
