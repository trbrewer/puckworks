name: slow-science
# The SLOW-marked science sweeps — NEVER on ordinary PRs (WP5 slow lane). Runs a DIFFERENT
# set than quick-pr (the slow-marked tests), retains result artifacts, then a full-suite
# backstop so nothing is lost.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # weekly

permissions:
  contents: read

concurrency:
  group: slow-science-${{ github.ref }}
  cancel-in-progress: false

jobs:
  slow:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,figures]"    # figures extra so figure-render tests run here
      - name: slow-marked science tests (with durations + JUnit artifact)
        run: pytest -q -m slow --durations=0 --junitxml=slow-report.xml
      - name: offline full-suite backstop (excludes live/gpu/external_data)
        run: pytest -q -m "not live and not gpu and not external_data"
      - name: pip environment (provenance)
        if: always()
        run: pip freeze > pip-freeze.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slow-science-evidence
          path: |
            slow-report.xml
            pip-freeze.txt
