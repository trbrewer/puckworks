name: slow-science
# The SLOW-marked science sweeps — NEVER on ordinary PRs (WP5 slow lane). Runs a DIFFERENT
# set than quick-pr (the slow-marked tests), retains result artifacts, then a full-suite
# backstop so nothing is lost.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # weekly

permissions:
  contents: read

concurrency:
  group: slow-science-${{ github.ref }}
  cancel-in-progress: false

jobs:
  slow:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,figures]"    # figures extra so figure-render tests run here
      - name: slow-marked science tests (with durations + JUnit artifact)
        run: pytest -q -m slow --durations=0 --junitxml=slow-report.xml
      - name: offline full-suite backstop (excludes live/gpu/external_data) + coverage baseline
        run: >
          pytest -q -m "not live and not gpu and not external_data"
          --cov=puckworks --cov-report=xml --cov-report=term
        # coverage is REPORTED as a baseline (P1.1/P1.3); no global threshold is imposed yet.
      - name: typed gate suite report (every gate runs; complete report)
        if: always()
        run: python -m puckworks.gate_runner --report=gate-report.json
      - name: pip environment (provenance)
        if: always()
        run: pip freeze > pip-freeze.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: slow-science-evidence
          path: |
            slow-report.xml
            gate-report.json
            coverage.xml
            pip-freeze.txt
