# NO corpus retention, explicit rate cap + privacy filter. Dispatch/schedule ONLY — never PRs.
# NOTE: the canary script is a WP0 remaining item; this lane is wired but disabled until it
# lands (guarded by the RUN_LIVE_CANARY secret so it never runs unintentionally).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"
jobs:
  canary:
    runs-on: ubuntu-latest
    if: ${{ secrets.RUN_LIVE_CANARY == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - run: echo "live-contract canary not yet implemented (WP0 remaining item)"
