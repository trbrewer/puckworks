name: live-contract
# Scheduled Visualizer API schema canary (WP3.1 live-contract lane). Schema-shape only:
# NO corpus retention, explicit rate cap + privacy filter. Dispatch/schedule ONLY — never PRs.
# The canary fetches 1 list page + 1 shot detail, asserts the schema shape, and retains
# NOTHING. Guarded by the RUN_LIVE_CANARY secret so it never runs unintentionally.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"
jobs:
  canary:
    runs-on: ubuntu-latest
    if: ${{ secrets.RUN_LIVE_CANARY == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[harvest]"
      - name: Visualizer API schema canary (1 list + 1 detail, NO retention)
        run: python -m puckworks.lib.visualizer_canary
