name: notebook-smoke
# Two ways to prove the quickstart notebook works:
#   * hermetic-dev-wheel  — build the CURRENT dev wheel, install it via the PUCKWORKS_WHEEL
#     override, execute with NO network. Guards that development changes don't break the notebook.
#   * public-release-wheel — verify the recorded v0.2.0 wheel SHA-256 against the live release
#     asset, then execute the notebook's DEFAULT (download + hash-verify) path against that exact
#     released wheel, and prove every API call the notebook makes exists in v0.2.0.
# Executed outputs go to a temp path and are never committed.
on:
  pull_request:
    paths:
      - "notebooks/puckworks_quickstart_colab.ipynb"
      - "puckworks/**"
      - "pyproject.toml"
      - "docs/status/public_release.json"
      - "README.md"
      - "docs/ACCESSIBILITY.md"
      - ".github/workflows/notebook-smoke.yml"
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "23 6 1 * *"      # monthly re-test of the canonical public release

permissions:
  contents: read

concurrency:
  group: notebook-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hermetic-dev-wheel:
    name: Mode 1 — hermetic (current dev wheel, no network)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: committed notebook carries no execution outputs
        run: |
          python - <<'PY'
          import json
          nb = json.load(open("notebooks/puckworks_quickstart_colab.ipynb"))
          for i, c in enumerate(nb["cells"]):
              if c["cell_type"] == "code":
                  assert not c.get("outputs"), f"cell {i} has committed outputs"
                  assert c.get("execution_count") in (None,), f"cell {i} has execution_count"
          print("committed notebook is clean")
          PY

      - name: build the current dev wheel (installed by the notebook via override)
        run: |
          python -m pip install --quiet build
          python -m build --wheel --outdir dist .
          ls dist/*.whl

      - name: notebook execution tooling (CPU only)
        run: python -m pip install --quiet jupyter nbconvert nbclient ipykernel matplotlib

      - name: execute the notebook offline against the local wheel (outside the checkout)
        env:
          PUCKWORKS_WHEEL_DIR: ${{ github.workspace }}/dist
        run: |
          export PUCKWORKS_WHEEL="$(ls "$PUCKWORKS_WHEEL_DIR"/puckworks-*.whl | head -n1)"
          echo "Installing wheel: $PUCKWORKS_WHEEL"
          # Run from RUNNER_TEMP so the repo's puckworks/ source does not shadow the installed wheel.
          cp notebooks/puckworks_quickstart_colab.ipynb "$RUNNER_TEMP/nb.ipynb"
          cd "$RUNNER_TEMP"
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=300 \
            --output executed_dev.ipynb nb.ipynb

      - name: verify completion marker (no residual errors)
        run: python "$GITHUB_WORKSPACE/.github/scripts/check_notebook_marker.py" "$RUNNER_TEMP/executed_dev.ipynb"

  public-release-wheel:
    name: Mode 2 — canonical v0.2.0 release (download + hash-verify)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: composite verify — schema + durable cross-check + LIVE (wheel+sdist+tag+assets+PyPI)
        run: python tools/release_record.py --verify-all

      - name: notebook execution tooling (CPU only)
        run: python -m pip install --quiet jupyter nbconvert nbclient ipykernel matplotlib

      - name: execute the notebook DEFAULT path (downloads + verifies v0.2.0), outside the checkout
        run: |
          # Run from RUNNER_TEMP so the repo's puckworks/ source (0.3.0.dev0) cannot shadow the
          # released wheel the notebook installs — this makes the release path actually be tested.
          cp notebooks/puckworks_quickstart_colab.ipynb "$RUNNER_TEMP/nb.ipynb"
          cd "$RUNNER_TEMP"
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=300 \
            --output executed_release.ipynb nb.ipynb

      - name: verify completion marker (no residual errors)
        run: python "$GITHUB_WORKSPACE/.github/scripts/check_notebook_marker.py" "$RUNNER_TEMP/executed_release.ipynb"

      - name: notebook used ONLY v0.2.0 public APIs (installed version is 0.2.0)
        run: |
          cd "$RUNNER_TEMP"
          python -c "import puckworks; assert puckworks.__version__ == '0.2.0', puckworks.__version__; print('release-mode API compatibility: v0.2.0 OK')"
