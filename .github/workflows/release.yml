name: release
# R4: clean-room build + install on a version tag or dispatch. Produces a real wheel + sdist,
# metadata-checks them, INSTALLS the wheel in a fresh venv OUTSIDE the source tree and smoke-
# tests it, writes a checksummed release manifest, and uploads the artifacts. Tag creation,
# Zenodo/DOI, and PyPI publish remain explicit human actions.
on:
  workflow_dispatch:
  push:
    tags: ["v*", "paper3-v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,figures,release]"
      - name: full offline suite (release confidence)
        run: pytest -q -m "not live and not gpu and not external_data"
      - name: generated-artifact + Paper 3 verify
        run: |
          python -m puckworks.paper3.registry_artifacts --verify
          python -m puckworks.paper3.build verify
      - name: build wheel + sdist, twine check, write manifest
        # A package tag (v*, not paper3-*) runs RELEASE mode: readiness gate + strict git provenance
        # + tag==HEAD. paper3-* tags and manual dispatch run a non-publishable REHEARSAL build.
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && \
             case "${GITHUB_REF_NAME}" in v*) [ "${GITHUB_REF_NAME#paper3-}" = "${GITHUB_REF_NAME}" ] ;; *) false ;; esac; then
            echo "RELEASE mode for tag ${GITHUB_REF_NAME}"
            python -m puckworks.release build --outdir dist --clean --tag "${GITHUB_REF_NAME}"
          else
            echo "REHEARSAL build (ref=${GITHUB_REF_NAME:-dispatch})"
            python -m puckworks.release build --outdir dist --clean
          fi
      - name: clean-room install of the built wheel (outside the source tree)
        run: |
          python -m venv /tmp/cleanroom
          /tmp/cleanroom/bin/pip install dist/*.whl
          cd /tmp
          /tmp/cleanroom/bin/python -c "import puckworks; from puckworks import registry, models; assert len(registry.components()) >= 20; print('clean-room import OK:', len(registry.components()), 'components')"
      - name: upload release artifacts (wheel, sdist, manifest, generated evidence)
        # PW-REL-005: only publish the release bundle when EVERY prior step (tests, verify, build,
        # twine, clean-room install) succeeded — never attach a partial/unverified candidate.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/release_manifest.json
            docs/paper3_resource/generated/
            docs/reproducibility/
          if-no-files-found: warn
      - name: upload failure diagnostics (never a release candidate)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-failure-logs
          path: |
            dist/release_manifest.json
          if-no-files-found: ignore
