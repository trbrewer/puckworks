name: platform-smoke
# Portability of ONE artifact on Ubuntu/Windows/macOS (Python 3.12). Two matrices:
#   * dev-wheel-smoke     — build the CURRENT dev wheel once, test THOSE EXACT bytes on all 3 OSes.
#   * public-release-smoke — download the recorded public-release wheel, verify its SHA-256, test THOSE
#     EXACT released bytes on all 3 OSes. Neither builds a different wheel per OS. The core package
#     is one pure-Python wheel; no per-OS release artifact is produced.
on:
  pull_request:
    paths:
      - "puckworks/**"
      - "pyproject.toml"
      - "tests/test_public_api.py"
      - "docs/status/public_release.json"
      - "README.md"
      - "docs/ACCESSIBILITY.md"
      - ".github/workflows/platform-smoke.yml"
  push:
    tags: ["v*"]
  workflow_dispatch:
  schedule:
    - cron: "37 6 1 * *"     # low-frequency monthly portability check (dev + public release)

permissions:
  contents: read

concurrency:
  group: platform-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: build one core wheel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: python -m pip install --quiet build
      - name: build the single artifact
        run: |
          python -m build --wheel --outdir dist .
          test "$(ls dist/*.whl | wc -l)" -eq 1
          case "$(ls dist)" in *py3-none-any.whl) echo "pure-python wheel ok";; *) echo "expected a py3-none-any wheel"; exit 1;; esac
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  dev-wheel-smoke:
    name: dev wheel — same bytes on ${{ matrix.os }}
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash          # bash is available on all three runners, incl. Windows
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: core-wheel
          path: wheelhouse

      - name: install the EXACT downloaded wheel
        run: |
          python -m pip install --upgrade pip >/dev/null
          WHEEL="$(ls wheelhouse/puckworks-*.whl | head -n1)"
          echo "Installing $WHEEL"
          python -m pip install "$WHEEL"

      - name: public smoke from OUTSIDE the checkout (proves site-packages import)
        run: |
          cd "$RUNNER_TEMP"
          python - <<'PY'
          import json, platform
          import puckworks
          assert "site-packages" in puckworks.__file__, puckworks.__file__
          print("platform :", platform.system(), platform.machine(), "py", platform.python_version())
          print("version  :", puckworks.__version__)
          puckworks.load_builtin_components()
          comps = puckworks.components()
          assert len(comps) >= 25, len(comps)
          suite = puckworks.evaluate_all_gates()
          assert suite.passed, "gate suite reported a genuine failure"
          # serialize/reload a public result (canonical writer uses default=str)
          blob = json.dumps(suite.to_dict(), default=str)
          back = json.loads(blob)
          assert back["schema_version"] == suite.to_dict()["schema_version"]
          print("components:", len(comps), "| gates:", suite.summary_text(), "| serialize round-trip OK")
          PY

      - name: public-API tests against the installed wheel (copied out of the source tree)
        run: |
          mkdir -p "$RUNNER_TEMP/pwtests"
          cp tests/conftest.py tests/test_public_api.py "$RUNNER_TEMP/pwtests/"
          python -m pip install --quiet pytest
          cd "$RUNNER_TEMP/pwtests"
          python -m pytest test_public_api.py -q

      - name: uninstall cleanly
        run: |
          python -m pip uninstall -y puckworks
          cd "$RUNNER_TEMP"
          python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('puckworks') is None else 1)" \
            && echo "clean uninstall verified"

  public-release-smoke:
    name: public release — same bytes on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: download the recorded release wheel and VERIFY it (via the validated record)
        run: |
          python - <<'PY'
          import hashlib, sys, urllib.request
          sys.path.insert(0, "tools")
          import release_record as R                       # strict semantic validation, not json.load
          rec = R.load_validated("docs/status/public_release.json")
          url = R.canonical_wheel_url(rec)
          data = urllib.request.urlopen(url, timeout=60).read()
          actual = hashlib.sha256(data).hexdigest()
          print("expected:", rec["wheel_sha256"]); print("actual  :", actual)
          if actual != rec["wheel_sha256"]:
              sys.exit("release wheel SHA-256 mismatch")
          open(rec["wheel_filename"], "wb").write(data)
          print("verified release wheel written:", rec["wheel_filename"])
          PY

      - name: install the EXACT verified release wheel + public smoke (recorded version)
        run: |
          # filename + expected version come from the validated record (version-driven across releases)
          WHEEL="$(ls puckworks-*-py3-none-any.whl | head -n1)"
          EXPECTED_VERSION="$(python -c "import sys; sys.path.insert(0,'tools'); import release_record as R; print(R.load_validated('docs/status/public_release.json')['version'])")"
          python -m pip install "$WHEEL"
          cd "$RUNNER_TEMP"
          python - "$EXPECTED_VERSION" <<'PY'
          import platform, sys
          import puckworks
          expected = sys.argv[1]
          assert "site-packages" in puckworks.__file__, puckworks.__file__
          assert puckworks.__version__ == expected, (puckworks.__version__, expected)
          print("platform :", platform.system(), platform.machine(), "py", platform.python_version())
          puckworks.load_builtin_components()
          comps = puckworks.components()
          assert len(comps) >= 25, len(comps)
          suite = puckworks.evaluate_all_gates()
          assert suite.passed, "gate suite reported a genuine failure"
          print("release wheel OK (v%s):" % expected, len(comps), "components |", suite.summary_text())
          PY

      - name: uninstall cleanly
        run: |
          python -m pip uninstall -y puckworks
          cd "$RUNNER_TEMP"
          python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('puckworks') is None else 1)" \
            && echo "clean uninstall verified"
