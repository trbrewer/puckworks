name: guided-pull-batch
# Reproducible, NON-INTERACTIVE Guided Pull Laboratory batch runner (#43 / #70). This is a batch
# runner, NOT a live UI. It builds the exact current wheel, installs it in isolation, runs the public
# comparison via tools/lab_batch.py with BOUNDED inputs passed through env vars (never shell-
# interpolated), and uploads one artifact (JSON + Markdown + figure). contents:read only; no secrets;
# no issue write; SHA-pinned actions; fixed timeout.
on:
  workflow_dispatch:
    inputs:
      preset:
        description: "Preset scenario id"
        type: choice
        options: ["pv19_named", "guided_v1"]
        default: "pv19_named"
      dose_g:
        description: "Dose in grams (5..30, blank = preset default)"
        type: string
        default: ""
      target_beverage_g:
        description: "Target beverage mass in grams (10..80, blank = preset default)"
        type: string
        default: ""
      pressure_bar:
        description: "Pressure in bar (1..12, blank = preset default)"
        type: string
        default: ""
      temperature_c:
        description: "Temperature in °C (80..98, blank = preset default)"
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: guided-pull-batch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  batch:
    name: build wheel + run the comparison batch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      # user inputs enter ONLY as env vars; tools/lab_batch.py validates + bounds them in Python
      LAB_PRESET: ${{ inputs.preset }}
      LAB_DOSE_G: ${{ inputs.dose_g }}
      LAB_TARGET_BEVERAGE_G: ${{ inputs.target_beverage_g }}
      LAB_PRESSURE_BAR: ${{ inputs.pressure_bar }}
      LAB_TEMPERATURE_C: ${{ inputs.temperature_c }}
      LAB_OUT_DIR: out/lab
      # This is a PUBLIC artifact run: the batch runs a rights preflight BEFORE any producer and REFUSES
      # to execute / publish a component that is not affirmatively cleared. Today the only common lens
      # (cameron2020.extraction_bdf) is NOT_REVIEWED, so this run is EXPECTED to block until that rights
      # review is completed — the rights preflight diagnostic is uploaded and the job fails clearly.
      LAB_EXECUTION_CONTEXT: PUBLIC_ARTIFACT
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: build the exact current wheel + record its SHA-256
        run: |
          python -m pip install --quiet build
          python -m build --wheel --outdir dist
          wheel="$(ls dist/*.whl)"
          echo "LAB_WHEEL_SHA256=$(python -c "import hashlib,sys;print(hashlib.sha256(open(sys.argv[1],'rb').read()).hexdigest())" "$wheel")" >> "$GITHUB_ENV"
      - name: install the wheel + viz extra into an isolated venv (outside the source tree)
        run: |
          python -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/python" -m pip install --quiet "$(ls dist/*.whl)" matplotlib
      - name: run the batch comparison (rights preflight first; inputs + provenance via env)
        # GITHUB_SHA / GITHUB_RUN_ID are GitHub-provided; LAB_WHEEL_SHA256 was recorded above. A blocked
        # public request writes only out/lab.rights_preflight.json (no scientific output) and fails.
        run: "$RUNNER_TEMP/venv/bin/python tools/lab_batch.py"
      - name: show the deterministic result summary
        if: success()
        run: cat out/lab/guided_pull_lab.md
      - name: upload the rights-preflight diagnostic when the public request was blocked
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: guided-pull-lab-rights-preflight
          path: out/lab.rights_preflight.json
          if-no-files-found: ignore
          retention-days: 30
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: success()
        with:
          name: guided-pull-lab-batch
          path: out/lab/
          if-no-files-found: error
          retention-days: 30
