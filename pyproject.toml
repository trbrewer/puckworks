[project]
name = "puckworks"
version = "0.1.0"
description = "Component registry for espresso process models: contracts, provenance, validation gates"
readme = "README.md"
license = {file = "LICENSE"}
# Supported Python: 3.10 (oldest) .. 3.13 (newest); 3.12 is the primary/release interpreter.
# All three are exercised in the quick-pr CI matrix.
requires-python = ">=3.10"
# Minimum bounds justified by the APIs actually used: numpy>=1.22 (stable typing / random.Generator,
# nan-functions), scipy>=1.8 (scipy.optimize.least_squares bounds, sparse/linalg used here). No
# upper caps — added only if a concrete incompatibility appears.
dependencies = ["numpy>=1.22", "scipy>=1.8"]
classifiers = [
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

[project.optional-dependencies]
lb = ["taichi"]
dev = ["pytest", "ruff"]
figures = ["matplotlib"]
harvest = ["requests"]
release = ["build", "twine"]
viz = ["matplotlib", "pillow", "imageio"]
viz3d = ["pyvista", "vtk"]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
# R9: lightweight first. Enforce pyflakes (real errors: unused imports, redefinitions,
# undefined names, bad f-strings) now; F841 (unused locals — some are intentional scaffolding
# in scientific code) is a documented follow-up before strengthening the ruleset.
select = ["F"]
ignore = ["F841"]

[tool.pytest.ini_options]
# WP5: CI lanes select DIFFERENT marked sets (quick-pr excludes these; slow-science runs slow).
markers = [
    "slow: science-heavy test (>~2 s); excluded from quick-pr, run by slow-science",
    "live: hits a live external service (bounded, secret-gated); never in quick-pr",
    "release: release-build / archive verification",
    "gpu: needs a GPU / taichi",
    "external_data: needs non-redistributable external data",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["puckworks*"]

[tool.setuptools.package-data]
puckworks = ["data/*.csv", "data/*.json"]
"puckworks.data" = ["*.csv", "*.json", "*.md", "**/*.csv", "**/*.json", "**/*.md"]
